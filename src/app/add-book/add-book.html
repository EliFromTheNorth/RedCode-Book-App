<h2>Add Book</h2>

<form (ngSubmit)="onSubmit()" #bookForm="ngForm">
  <div>
    <label for="title">Title</label>
    <input id="title" name="title" [(ngModel)]="book.title" required />
  </div>

  <div>
    <label for="author">Author</label>
    <input id="author" name="author" [(ngModel)]="book.author" required />
  </div>

  <div>
    <label for="publishDate">Year Published</label>
    <input id="publishDate" name="publishDate" type="number" min="1000" max="2100" [(ngModel)]="book.publishDate" required />
  </div>

  <button type="submit" [disabled]="bookForm.invalid">Add Book</button>
</form>
