<div class="d-flex flex-column align-items-center py-4">
  <h2>Redigera citat</h2>

  <form class="py-5 col-12 col-md-7 col-lg-5" (ngSubmit)="onSubmit()" #citatForm="ngForm">
    <div class="mb-3">
      <label class="form-label" for="text">Citat</label>
      <textarea class="form-control" id="text" name="text" rows="4" [(ngModel)]="citat.text" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label" for="author">Författare</label>
      <input class="form-control" id="author" name="author" [(ngModel)]="citat.author" />
    </div>

    <button class="btn btn-primary w-100 my-5 fs-5 fw-bold" type="submit" [disabled]="citatForm.invalid">Spara ändringar</button>
  </form>
</div>
