<div class="position-relative d-flex flex-column align-items-center py-4">
  <button class="btn btn-link btn-back position-absolute top-0 start-0 fs-1 border-0" style="color: #FB923C;" routerLink="/citat"><i class="fa-solid fa-circle-left"></i></button>
  <h2>Lägg till citat</h2>

  <form class="py-5 col-12 col-md-7 col-lg-5" (ngSubmit)="onSubmit()" #citatForm="ngForm">
    <div class="mb-3">
      <label class="form-label" for="text">Citat</label>
      <textarea class="form-control" id="text" name="text" rows="4" [(ngModel)]="citat.text" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label" for="author">Namn</label>
      <input class="form-control" id="author" name="author" [(ngModel)]="citat.author" />
    </div>

    <button class="btn btn-primary w-100 my-5 fs-5 fw-bold" type="submit" [disabled]="citatForm.invalid">Lägg till</button>
  </form>
</div>
