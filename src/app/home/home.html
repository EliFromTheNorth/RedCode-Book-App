<div class="container d-flex flex-column align-items-center py-4">

  <h2 class="mb-3">Books</h2>

  <button class="btn btn-primary mb-4" routerLink="/add-book">Add Book</button>

  <ul class="list-unstyled w-100 d-flex flex-column align-items-center gap-2">
    <li *ngFor="let book of books" class="book-item d-flex align-items-center gap-3 border border-3 rounded-5 px-4 py-2">
      <div class="d-flex flex-column">
        <span class="fw-bold">{{ book.title }}</span>
        <span>{{ book.author }}, {{ book.publishDate }}</span>
      </div>
      <div class="d-flex gap-2 ms-auto">
        <button class="btn-edit btn btn-link p-0 border-0" [routerLink]="['/edit-book', book.id]"><i class="fa-regular fa-pen-to-square"></i></button>
        <button class="btn btn-link p-0 text-danger border-0" (click)="deleteBook(book.id!, book.title)"><i class="fa-regular fa-trash-can"></i></button>
      </div>
    </li>
  </ul>

</div>
